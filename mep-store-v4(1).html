<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEP Store</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f6f9;--bg2:#fff;--bg3:#f0f2f6;--bg4:#e8ebf0;
  --border:#e2e6ed;--border2:#d0d5de;
  --text:#1a1f2e;--text2:#6b7488;--text3:#9ba3b8;
  --sh:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --green:#16a34a;--green-bg:#dcfce7;
  --orange:#ea580c;--orange-bg:#fff7ed;
  --blue:#2563eb;--blue-bg:#eff6ff;
  --red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --teal:#0d9488;--teal-bg:#f0fdfa;
  --purple:#7c3aed;--purple-bg:#f5f3ff;
  --accent:#1e40af;--accent-l:#dbeafe;
  --r:6px;--r2:10px;--r3:14px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:234px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:15px 16px 13px;border-bottom:1px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:9px}
.logo-ic{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#1e40af,#0d9488);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.logo-title{font-size:12px;font-weight:700;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:1px;display:flex;align-items:center;gap:3px}
.logo-ed{cursor:pointer;border-radius:3px;padding:0 2px;transition:background .12s}
.logo-ed:hover{background:var(--bg4)}
.logo-inp{background:var(--bg2);border:1px solid var(--accent);border-radius:3px;padding:0 3px;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);outline:none}
.nsec{padding:11px 13px 3px;font-size:9px;font-weight:700;letter-spacing:.13em;color:var(--text3);text-transform:uppercase}
.ni{display:flex;align-items:center;gap:7px;padding:6px 9px;margin:1px 5px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;width:calc(100% - 10px);text-align:left;transition:all .12s}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.act{background:var(--accent-l);color:var(--accent);font-weight:600}
/* disc nav */
.dn-item{display:flex;align-items:center;margin:1px 5px;border-radius:var(--r);border:1px solid transparent;overflow:hidden;transition:all .12s}
.dn-item:hover{border-color:var(--border)}
.dn-btn{display:flex;align-items:center;gap:7px;padding:6px 9px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;flex:1;text-align:left}
.dn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dn-edit{background:none;border:none;cursor:pointer;padding:3px 6px;color:var(--text3);font-size:11px;border-radius:var(--r)}
.dn-edit:hover{color:var(--text);background:var(--bg3)}
.dn-item.act .dn-btn{color:var(--text);font-weight:600}
.dn-item.disc-0.act{background:#fffbeb;border-color:#fde68a}.dn-item.disc-0.act .dn-btn{color:#92400e}
.dn-item.disc-1.act{background:#eff6ff;border-color:#bfdbfe}.dn-item.disc-1.act .dn-btn{color:#1e3a8a}
.dn-item.disc-2.act{background:#f0fdfa;border-color:#99f6e4}.dn-item.disc-2.act .dn-btn{color:#134e4a}
.dn-item.disc-3.act{background:#f5f3ff;border-color:#ddd6fe}.dn-item.disc-3.act .dn-btn{color:#4c1d95}
.dn-item.disc-4.act{background:#ecfdf5;border-color:#6ee7b7}.dn-item.disc-4.act .dn-btn{color:#064e3b}
.dn-item.disc-5.act{background:#fef2f2;border-color:#fca5a5}.dn-item.disc-5.act .dn-btn{color:#7f1d1d}
.add-disc{display:flex;align-items:center;gap:7px;padding:5px 9px;margin:2px 5px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;color:var(--accent);border:1px dashed var(--border2);background:none;width:calc(100% - 10px);text-align:left;transition:all .12s}
.add-disc:hover{background:var(--accent-l);border-color:var(--accent)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}

/* STORE SECTION TABS */
.stabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px}
.stab{padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .13s}
.stab:hover{color:var(--text)}
.stab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* CARDS */
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--sh)}
.sl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.sv{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace}
.ss{font-size:12px;color:var(--text2);margin-top:3px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh)}
.th{padding:10px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tt{font-size:13px;font-weight:700;color:var(--text)}

/* TABLE */
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:7px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.be{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a}
.bp{background:var(--blue-bg);color:var(--blue);border:1px solid #bfdbfe}
.bh{background:var(--teal-bg);color:var(--teal);border:1px solid #99f6e4}
.bl{background:var(--purple-bg);color:var(--purple);border:1px solid #ddd6fe}
.bg{background:var(--green-bg);color:#14532d;border:1px solid #86efac}
.bo{background:var(--orange-bg);color:#9a3412;border:1px solid #fed7aa}
.br{background:var(--red-bg);color:#7f1d1d;border:1px solid #fca5a5}
.bx{background:#ecfdf5;color:#064e3b;border:1px solid #6ee7b7}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:1px solid;transition:all .13s;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff}.btn-p:hover{background:#1d3bab}
.btn-g{background:transparent;border-color:var(--border2);color:var(--text2)}.btn-g:hover{background:var(--bg3);color:var(--text)}
.btn-s{background:var(--green);border-color:var(--green);color:#fff}.btn-s:hover{opacity:.88}
.btn-t{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-d{background:var(--red-bg);border-color:#fca5a5;color:#7f1d1d}
.btn-pdf{background:#dc2626;border-color:#b91c1c;color:#fff}
.btn-xl{background:#059669;border-color:#047857;color:#fff}
.btn-sm{padding:4px 9px;font-size:12px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);max-width:96vw;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mhd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);flex-shrink:0}
.mt{font-size:14px;font-weight:700}
.mb{padding:18px;overflow-y:auto;flex:1}
.mft{padding:11px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg3);flex-shrink:0;flex-wrap:wrap}

/* FORMS */
.fr{display:grid;gap:10px;margin-bottom:10px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;font-weight:600;color:var(--text2)}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:13px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;width:100%;outline:none;transition:border .13s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(30,64,175,.08)}
textarea{resize:vertical;min-height:70px}
.srch{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;font-size:13px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;outline:none;width:190px;transition:all .13s}
.srch:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,64,175,.08)}

/* MISC */
.pb{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;flex-shrink:0}
.pf{height:100%;border-radius:3px}
.fc{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}
.tag{display:inline-flex;padding:1px 6px;border-radius:4px;font-size:11px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-weight:600}
.xbtn{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:17px;line-height:1;padding:3px 6px;border-radius:var(--r)}
.xbtn:hover{background:var(--bg4);color:var(--text)}
.mono{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.ib{background:var(--blue-bg);border:1px solid #bfdbfe;border-radius:var(--r);padding:9px 12px;font-size:12px;color:#1e3a8a;margin-bottom:12px}
.pill{display:inline-block;padding:1px 6px;border-radius:100px;font-size:10px;font-weight:700;background:var(--bg4);color:var(--text2)}
.page-t{font-size:17px;font-weight:700}.page-s{font-size:13px;color:var(--text2);margin-top:1px}

/* CAT ACCORDION */
.cat-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden}
.cat-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);user-select:none;cursor:pointer}
.cat-hdr.open{background:#eff6ff;border-bottom-color:#c7d7f9}
.cat-body{display:none}.cat-body.open{display:block}
.sub-hdr{display:flex;align-items:center;gap:7px;padding:5px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}

/* DRAG SORT */
.dh{cursor:grab;color:var(--text3);padding:2px 5px;font-size:15px;user-select:none;line-height:1}
.dh:active{cursor:grabbing}
.dragging{opacity:.3;background:var(--accent-l) !important}
.drag-over{box-shadow:inset 0 2px 0 var(--accent) !important;background:var(--accent-l) !important}
.sort-banner{display:flex;align-items:center;gap:8px;padding:8px 13px;background:#dbeafe;border:1px solid #93c5fd;border-radius:var(--r2);margin-bottom:12px;font-size:13px;font-weight:600;color:#1e40af}

/* EXCEL IMPORT */
.imp-row{display:flex;align-items:center;gap:7px;padding:5px 10px;border-bottom:1px solid var(--border);font-size:12px}
.imp-row.ok{background:#f0fdf4}.imp-row.dup{background:#fef9c3}.imp-row.err{background:var(--red-bg)}

/* ── AUTH / LOGIN ─────────────────── */
.auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e40af 0%,#0d9488 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-card{background:#fff;border-radius:16px;padding:40px 36px;width:420px;max-width:95vw;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.auth-logo-ic{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#1e40af,#0d9488);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.auth-title{font-size:20px;font-weight:700;color:#1a1f2e}
.auth-sub{font-size:13px;color:#6b7488;margin-top:2px}
.auth-tabs{display:flex;gap:3px;background:#f0f2f6;padding:3px;border-radius:8px;margin-bottom:20px}
.auth-tab{flex:1;padding:7px;border:none;background:none;border-radius:6px;font-size:13px;font-weight:600;color:#6b7488;cursor:pointer;transition:all .13s}
.auth-tab.on{background:#fff;color:#1e40af;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:#9ba3b8;font-size:12px}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:#e2e6ed}
.auth-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px;border:1px solid #e2e6ed;border-radius:8px;background:#fff;font-size:14px;font-weight:600;color:#1a1f2e;cursor:pointer;transition:all .13s}
.auth-google:hover{background:#f4f6f9;border-color:#d0d5de}
.auth-google svg{width:18px;height:18px}
.role-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}
.role-admin{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.role-store{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.role-foreman{background:#f0fdfa;color:#0d9488;border:1px solid #99f6e4}
.role-viewer{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
/* ── HISTORY / REQUESTS ────────────── */
.hist-row{display:grid;grid-template-columns:90px 1fr 80px 80px 100px 90px;gap:0;padding:8px 14px;border-bottom:1px solid var(--border);align-items:center;font-size:13px}
.hist-row:hover{background:var(--bg3)}
.hist-hdr{background:var(--bg4);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--border)}
.status-pill{display:inline-flex;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700}
.sp-approved{background:#dcfce7;color:#14532d}
.sp-pending{background:#fef9c3;color:#854d0e}
.sp-rejected{background:#fef2f2;color:#7f1d1d}
.sp-edited{background:#eff6ff;color:#1e3a8a}
/* ── ACCESS MANAGER ────────────────── */
.user-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border)}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
/* ── TOPBAR USER CHIP ──────────────── */
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:100px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .13s}
.user-chip:hover{background:var(--bg3)}
.user-chip-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.user-chip-name{font-size:12px;font-weight:600;color:var(--text)}
.user-chip-role{font-size:10px;color:var(--text2)}
.dropdown-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--sh);min-width:180px;z-index:200;overflow:hidden}
.dropdown-item{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .12s}
.dropdown-item:hover{background:var(--bg3);color:var(--text)}
</style>
</head>

  <div class="sb">

      <div class="logo-row">

        <div style="min-width:0">
          <div class="logo-title">MEP Store</div>
          <div class="logo-sub">
            <span class="logo-ed" id="lbl-co" title="Click to rename">MODUN GULF</span>
            <span style="color:var(--border2)">&bull;</span>
            <span class="logo-ed" id="lbl-pr" title="Click to rename">TAORMINA</span>
          </div>
        </div>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto;padding-bottom:10px">
      <div class="nsec">Overview</div>
      <button class="ni" id="ni-dash">&#9632; Dashboard</button>
      <div class="nsec">Stores</div>
      <div id="disc-nav"></div>

      <div class="nsec">Reports</div>
      <button class="ni" id="ni-reports">&#8681; PDF Reports</button>
      <button class="ni" id="ni-access">&#128274; Access</button>
    </div>
    <div style="padding:8px 12px;border-top:1px solid var(--border);background:var(--bg3)">
      <div style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">v4.0 &bull; MEP-STORE</div>
    </div>
  </div>
  <div class="main">
    <div class="hdr">
      <div><div class="page-t" id="ptitle">Dashboard</div><div class="page-s" id="psub"></div></div>
      <div class="fc" id="hact"></div>
      <div style="position:relative" id="user-chip-wrap"></div>
    </div>
    <div class="content" id="mc"></div>
  </div>
</div>
<div id="mr"></div>

function gm(id){for(var i=0;i<DB.mats.length;i++)if(DB.mats[i].id===id)return DB.mats[i];return null;}
function gs(id){for(var i=0;i<DB.supps.length;i++)if(DB.supps[i].id===id)return DB.supps[i];return null;}
function gl(id){for(var i=0;i<DB.lpos.length;i++)if(DB.lpos[i].id===id)return DB.lpos[i];return null;}
function gcat(id){for(var i=0;i<DB.cats.length;i++)if(DB.cats[i].id===id)return DB.cats[i];return null;}
function gsub(id){for(var i=0;i<DB.subs.length;i++)if(DB.subs[i].id===id)return DB.subs[i];return null;}
function cfd(disc){return DB.cats.filter(function(c){return c.disc===disc;}).sort(function(a,b){return a.sort-b.sort;});}
function sfc(cid){return DB.subs.filter(function(s){return s.cid===cid;}).sort(function(a,b){return a.sort-b.sort;});}
function mfs(sid){return DB.mats.filter(function(m){return m.sid===sid;}).sort(function(a,b){return a.sort-b.sort;});}
function mfd(disc){return DB.mats.filter(function(m){return m.disc===disc;});}
function pal(disc){var i=DB.discs.indexOf(disc);return PAL[i>=0?i%PAL.length:0]||PAL[0];}
function fc(n){return "AED "+Number(n).toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fn(n){return Number(n).toLocaleString("en");}
function fdate(d){if(!d)return "";var p=d.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function today(){return new Date().toISOString().slice(0,10);}
function sv(m){return m.stock*m.price;}
function tsv(disc){return(disc?mfd(disc):DB.mats).reduce(function(s,m){return s+sv(m);},0);}
function stcolor(n){return n===0?"#dc2626":n<50?"#ea580c":n<200?"#d97706":"#16a34a";}
function lrec(l){return l.items.reduce(function(s,i){return s+i.recv*i.price;},0);}
function lbal(l){return l.items.reduce(function(s,i){return s+(i.qty-i.recv)*i.price;},0);}
function lst(l){if(l.items.every(function(i){return i.recv>=i.qty;}))return "Complete";if(l.items.some(function(i){return i.recv>0;}))return "Partial";return "Pending";}
function nid(p,k){return p+String(DB.nxt[k]++).padStart(3,"0");}
function badge(disc){var p=pal(disc);return '<span class="badge '+p.badge+'">'+disc+"</span>";}

function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="cls"){e.className=attrs[k];}
    else if(k==="html"){e.innerHTML=attrs[k];}
    else if(k==="text"){e.textContent=attrs[k];}
    else if(k.indexOf("on")===0){e.addEventListener(k.slice(2),attrs[k]);}
    else{e.setAttribute(k,attrs[k]);}
  });
  if(children)children.forEach(function(c){if(c)e.appendChild(c);});
  return e;
}
function div(cls,children){return el("div",{cls:cls},children);}
function btn(cls,txt,handler){var b=el("button",{cls:"btn "+cls,text:txt});b.onclick=handler;return b;}
function mount(id,elem){var c=document.getElementById(id);if(!c)return;c.innerHTML="";if(elem)c.appendChild(elem);}

function setHdr(t,s,actions){
  document.getElementById("ptitle").textContent=t;
  document.getElementById("psub").textContent=s||"";
  var ha=document.getElementById("hact");ha.innerHTML="";
  if(actions)actions.forEach(function(a){ha.appendChild(a);});
}
function clearNav(){
  document.querySelectorAll(".ni").forEach(function(b){b.classList.remove("act");});
  document.querySelectorAll(".dn-item").forEach(function(b){b.className=b.className.replace(/\bact\b/g,"").trim();});
}
function markNav(id){clearNav();var e=document.getElementById(id);if(e)e.classList.add("act");}

function renDisc(old){

  if(DB.discs.indexOf(n)>=0){alert("Name in use.");return;}

function dropCat(fromId,toId,disc){
  if(!fromId||fromId===toId)return;
  var cats=cfd(disc);
  var fi=cats.findIndex(function(c){return c.id===fromId;});
  var ti=cats.findIndex(function(c){return c.id===toId;});
  if(fi<0||ti<0)return;
  var moved=cats.splice(fi,1)[0];cats.splice(ti,0,moved);cats.forEach(function(c,i){c.sort=i;});
  goStore(disc);
}
function dropSub(fromId,toId,catId){
  if(!fromId||fromId===toId)return;
  var subs=sfc(catId);
  var fi=subs.findIndex(function(s){return s.id===fromId;});
  var ti=subs.findIndex(function(s){return s.id===toId;});
  if(fi<0||ti<0)return;
  var moved=subs.splice(fi,1)[0];subs.splice(ti,0,moved);subs.forEach(function(s,i){s.sort=i;});
  goStore(DISC);
}
function dropMat(fromId,toId){
  if(!fromId||fromId===toId)return;
  var src=gm(fromId);var tgt=gm(toId);if(!src||!tgt)return;
  if(src.sid!==tgt.sid){src.sid=tgt.sid;src.cid=tgt.cid;}
  var si=DB.mats.indexOf(src);DB.mats.splice(si,1);
  var ti=DB.mats.indexOf(tgt);DB.mats.splice(ti,0,src);
  mfs(tgt.sid).forEach(function(m,i){m.sort=i;});
  goStore(DISC);
}

function saveTallyAll(disc){
  if(!window._tallyInputs || !window._tallyInputs[disc]) return;
  var changed = 0;
  var errors  = [];
  var entries = window._tallyInputs[disc];

  Object.keys(entries).forEach(function(mid){
    var entry = entries[mid];
    var m     = entry.m;
    var newQ  = parseInt(entry.inp.value)||0;
    if(newQ < 0){ errors.push(m.name+": qty cannot be negative"); return; }
    if(newQ === m.stock) return; // no change
    var diff = newQ - m.stock;
    var adjType = diff > 0 ? "in" : "out";
    // Log as a tally adjustment transaction
    DB.txns.push({
      id:   nid("t","txn"),
      type: adjType,
      disc: disc,
      mid:  mid,
      qty:  Math.abs(diff),
      date: today(),
      ref:  "Tally Adjustment",
      by:   CURRENT_USER ? CURRENT_USER.name : "Admin",
    });
    m.stock = newQ;
    changed++;
  });

  if(errors.length){ alert("Errors:\n"+errors.join("\n")); return; }
  if(!changed){ alert("No changes to save."); return; }

  window._tallyInputs[disc] = {};
  alert(changed+" material(s) updated. Logged as tally adjustments.");
  STAB = "tally";
  goStore(disc);
}

    var cadd=el("button",{title:"Add subcategory",style:"background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;font-weight:700;padding:2px 5px;",html:"+"});

    catIconWrap.appendChild(cedit); catIconWrap.appendChild(cadd);
    catHdr.appendChild(catIconWrap);

    // sub/item count + disc badge
    catHdr.appendChild(el("span",{style:"font-size:12px;color:var(--text3);margin-left:8px",text:totalSubs+" sub-categories \u00b7 "+allItems.length+" items"}));
    var dbadge=el("span",{cls:"badge",text:disc});

    catHdr.appendChild(dbadge);
    block.appendChild(catHdr);

    // ── SUBCATEGORIES ────────────────────
    sfc(cat.id).forEach(function(sub){
      var items=mfs(sub.id);
      if(srq) items=items.filter(function(m){return m.name.toLowerCase().indexOf(srq)>=0||(m.brand||"").toLowerCase().indexOf(srq)>=0;});
      if(!items.length) return;

      if(_mSort==="items"){
        var sdh=el("span",{html:"&#8942;&#8942;",style:"color:var(--border2);font-size:14px;cursor:grab;"});
        subHdr.setAttribute("draggable","true");
        subHdr.ondragstart=(function(sid,cid){return function(e){_mDragSid=sid;_mDragCid=cid;e.dataTransfer.effectAllowed="move";}})(sub.id,cat.id);
        subHdr.ondragover=function(e){e.preventDefault();subHdr.classList.add("drag-over");};
        subHdr.ondragleave=function(){subHdr.classList.remove("drag-over");};
        subHdr.ondrop=(function(sid){return function(e){e.preventDefault();subHdr.classList.remove("drag-over");dropSub(_mDragSid,sid,cat.id);mount("mc",buildMats());}})(sub.id);
        subHdr.appendChild(sdh);

      subHdr.appendChild(el("span",{style:"font-size:12px;font-weight:700;color:var(--text)",text:sub.name}));
      // edit sub + add item

      sedit.onclick=(function(sid,sn){return function(e){e.stopPropagation();var n=prompt("Rename subcategory:",sn);if(n&&n!==sn){var s=gsub(sid);if(s){s.name=n;mount("mc",buildMats());}}}})(sub.id,sub.name);
      var sadd=el("button",{title:"Add item",style:"background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;font-weight:700;padding:1px 5px;",html:"+"});

      subHdr.appendChild(sedit); subHdr.appendChild(sadd);

      if(SORT_ITEMS) colHdr.appendChild(el("span",null)); // drag handle space
      ["Item & Description","Brand","Unit","Rate (AED)","Actions"].forEach(function(c,ci){
        var cs=el("span",{style:"font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;",text:c});
        if(ci>0) cs.style.textAlign="right";
        colHdr.appendChild(cs);
      });
      block.appendChild(colHdr);

      // Item rows
      items.forEach(function(m){
        var row=el("div",{style:"display:grid;grid-template-columns:"+colGrid+";padding:9px 18px;border-bottom:1px solid var(--border);align-items:center;gap:0;background:#fff;"});

        row.onmouseout=function(){this.style.background="#fff";};

        if(SORT_ITEMS){
          var rdh=el("span",{html:"&#8942;&#8942;",style:"color:var(--border2);font-size:14px;cursor:grab;"});
          row.setAttribute("draggable","true");
          row.ondragstart=(function(mid){return function(e){_mDragMid=mid;row.classList.add("dragging");e.dataTransfer.effectAllowed="move";}})(m.id);
          row.ondragend=function(){row.classList.remove("dragging");};
          row.ondragover=function(e){e.preventDefault();row.classList.add("drag-over");};
          row.ondragleave=function(){row.classList.remove("drag-over");};
          row.ondrop=(function(mid){return function(e){e.preventDefault();row.classList.remove("drag-over");dropMat(_mDragMid,mid);mount("mc",buildMats());}})(m.id);
          row.appendChild(rdh);
        }

        // Name + description
        var nameCol=el("div",null);
        nameCol.appendChild(el("div",{style:"font-size:13px;font-weight:600;color:var(--text)",text:m.name}));

        row.appendChild(nameCol);

        // Brand
        row.appendChild(el("div",{style:"text-align:right;font-size:13px;color:var(--text2)",text:m.brand||"-"}));
        // Unit
        row.appendChild(el("div",{style:"text-align:right;font-size:13px;color:var(--text2)",text:m.unit}));
        // Rate
        var rateStr=m.price>0?m.price.toFixed(2)+" AED":"-";
        row.appendChild(el("div",{style:"text-align:right;font-size:13px;font-weight:600;color:var(--text)",text:rateStr}));

        // Actions: edit (blue pencil) + delete (red trash)
        var acts=el("div",{style:"display:flex;align-items:center;justify-content:flex-end;gap:8px"});
        var editIco=el("button",{html:"&#9998;",title:"Edit",style:"background:none;border:none;cursor:pointer;color:#2563eb;font-size:17px;padding:2px;border-radius:4px;"});
        editIco.onclick=(function(mid){return function(){openMatModal(mid);};})(m.id);
        var delIco=el("button",{html:"&#128465;",title:"Delete",style:"background:none;border:none;cursor:pointer;color:#dc2626;font-size:17px;padding:2px;border-radius:4px;"});
        delIco.onclick=(function(mid,mn){return function(){if(!confirm("Delete \""+mn+"\"?"))return;DB.mats=DB.mats.filter(function(x){return x.id!==mid;});mount("mc",buildMats());};})(m.id,m.name);
        acts.appendChild(editIco); acts.appendChild(delIco);
        row.appendChild(acts);
        block.appendChild(row);
      });

      // Add item link at bottom of subcategory
      if(!SORT_ITEMS){
        var addItemRow=el("div",{style:"padding:7px 18px;"});
        var addItemBtn=el("button",{style:"background:none;border:none;cursor:pointer;font-size:12px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:4px;",html:"+ Add Item"});
        addItemBtn.onclick=(function(cid,sid){return function(){openAddItemToSub(cid,sid);};})(cat.id,sub.id);
        addItemRow.appendChild(addItemBtn);
        block.appendChild(addItemRow);
      }
    });
    wrap.appendChild(block);
  });
  return wrap;
}

// ── ADD ITEM MODAL (matches Image 2) ────────────────
function openAddItemToSub(catId, subId){
  var cat=gcat(catId); var sub=gsub(subId);
  var disc=cat?cat.disc:"Electrical";
  var titleText="Add Item to: "+(cat?cat.name:"")+(sub?" > "+sub.name:"");

  var catSel=el("select",{id:"ai_cat"});
  cfd(disc).forEach(function(c){catSel.appendChild(el("option",{value:c.id,text:c.name,selected:c.id===catId?"true":undefined}));});
  var subSel=el("select",{id:"ai_sub"});
  sfc(catId).forEach(function(s){subSel.appendChild(el("option",{value:s.id,text:s.name,selected:s.id===subId?"true":undefined}));});
  catSel.onchange=function(){subSel.innerHTML="";sfc(catSel.value).forEach(function(s){subSel.appendChild(el("option",{value:s.id,text:s.name}));});};

  var nameInp=el("input",{placeholder:"e.g., 32mm PPR Pipe"});
  var descTa=el("textarea",{placeholder:"Additional details about the item"});descTa.style.cssText="min-height:75px;resize:vertical;";
  var brandInp=el("input",{placeholder:"e.g., Polyfab, Ashirvad"});
  var unitSel=sel("ai_unit",["No.s","nos","m","m2","m3","kg","L","set","roll","box","pair"].map(function(u){return{text:u,value:u};}), "No.s");
  var rateInp=el("input",{placeholder:"e.g., 10.50 or N/A"});
  var minStk=el("input",{type:"number",value:"0",min:"0"});

  var body=[
    frow("c1",[fgroup("Main Category *",catSel)]),
    frow("c1",[fgroup("Sub Category *",subSel)]),
    frow("c1",[fgroup("Item Name *",nameInp)]),
    frow("c1",[fgroup("Description",descTa)]),
    frow("c1",[fgroup("Brand",brandInp)]),
    frow("c2",[fgroup("Unit",unitSel),fgroup("Standard Rate (AED) *",rateInp)]),
    frow("c1",[fgroup("Minimum Stock Level",minStk)]),
  ];

  sm(makeModal(titleText, body, [
    btn("btn-g","Cancel",cm),
    btn("btn-p","Add Item",function(){
      var name=nameInp.value.trim();
      if(!name){alert("Enter item name.");return;}
      var cid=catSel.value; var sid=subSel.value;
      var priceVal=parseFloat(rateInp.value)||0;
      DB.mats.push({id:nid("m","mat"),disc:disc,cid:cid,sid:sid,name:name,desc:descTa.value.trim(),brand:brandInp.value.trim(),unit:unitSel.value,price:priceVal,minStock:parseInt(minStk.value)||0,stock:0,sort:mfs(sid).length});
      cm(); mount("mc",buildMats());
    }),
  ],"480px"));
}

// CAT MANAGER

function buildCatMgr(){
  var grid=el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:14px"});
  DB.discs.forEach(function(disc){
    var card=div("tc",null);
    var hd=div("th",null);hd.innerHTML='<span class="tt">'+badge(disc)+" &nbsp;"+disc+"</span>";
    hd.appendChild(btn("btn-g btn-sm","+ Category",function(){addCat(disc);}));
    card.appendChild(hd);
    var inner=el("div",{style:"padding:12px"});
    var cats=cfd(disc);
    if(!cats.length){inner.appendChild(el("div",{cls:"empty",text:"No categories."}));}
    cats.forEach(function(cat){
      var subs=sfc(cat.id);var total=0;subs.forEach(function(s){total+=mfs(s.id).length;});
      var box=el("div",{style:"margin-bottom:10px;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden"});
      var hd2=el("div",{style:"background:var(--bg3);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)"});
      hd2.appendChild(el("span",{html:"<strong>"+cat.name+"</strong> <span class='pill'>"+total+"</span>"}));
      var acts=div("fc",null);
      acts.appendChild(btn("btn-g btn-sm","Rename",(function(cid,cname){return function(){var n=prompt("Rename:",cname);if(n&&n!==cname){var c=gcat(cid);if(c){c.name=n;render();}}};})(cat.id,cat.name)));
      acts.appendChild(btn("btn-g btn-sm","+ Sub",(function(cid){return function(){addSub(cid);};})(cat.id)));
      acts.appendChild(btn("btn-d btn-sm","Delete",(function(cid,cname){return function(){delCat(cid,cname);};})(cat.id,cat.name)));
      hd2.appendChild(acts);box.appendChild(hd2);
      subs.forEach(function(sub){var cnt=mfs(sub.id).length;
        var sr=el("div",{style:"padding:6px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px"});
        sr.appendChild(el("span",{html:"<span style='color:var(--text3);margin-right:5px'>&#8627;</span>"+sub.name+" <span class='pill'>"+cnt+"</span>"}));
        var sa=div("fc",null);
        sa.appendChild(btn("btn-g btn-sm","Rename",(function(sid,sname){return function(){var n=prompt("Rename:",sname);if(n&&n!==sname){var s=gsub(sid);if(s){s.name=n;render();}}};})(sub.id,sub.name)));
        sa.appendChild(btn("btn-d btn-sm","Del",(function(sid,sname){return function(){delSub(sid,sname);};})(sub.id,sub.name)));
        sr.appendChild(sa);box.appendChild(sr);
      });
      inner.appendChild(box);
    });
    card.appendChild(inner);grid.appendChild(card);
  });
  return grid;
}
function addCat(disc){var n=prompt("New category for "+disc+":");if(!n)return;var id=nid("c","cat");DB.cats.push({id:id,disc:disc,name:n,sort:cfd(disc).length});render();}
function addSub(cid){var n=prompt("New subcategory:");if(!n)return;var id=nid("sc","sub");DB.subs.push({id:id,cid:cid,name:n,sort:sfc(cid).length});render();}
function delCat(id,name){var cnt=0;sfc(id).forEach(function(s){cnt+=mfs(s.id).length;});if(!confirm("Delete \""+name+"\" and "+cnt+" materials?"))return;var sids=sfc(id).map(function(s){return s.id;});DB.mats=DB.mats.filter(function(m){return sids.indexOf(m.sid)<0;});DB.subs=DB.subs.filter(function(s){return s.cid!==id;});DB.cats=DB.cats.filter(function(c){return c.id!==id;});render();}
function delSub(id,name){var cnt=mfs(id).length;if(!confirm("Delete \""+name+"\" and "+cnt+" materials?"))return;DB.mats=DB.mats.filter(function(m){return m.sid!==id;});DB.subs=DB.subs.filter(function(s){return s.id!==id;});render();}

function roleBadge(role){
  var map={admin:"role-admin",storekeeper:"role-store",foreman:"role-foreman",viewer:"role-viewer"};
  var labels={admin:"Admin",storekeeper:"Storekeeper",foreman:"Foreman",viewer:"Viewer"};
  return '<span class="role-badge '+(map[role]||"role-viewer")+'">'+(labels[role]||role)+'</span>';
}
function avatarEl(u,size){
  size=size||36;
  var av=el("div",{style:"width:"+size+"px;height:"+size+"px;border-radius:50%;background:"+u.color+";display:flex;align-items:center;justify-content:center;font-size:"+(size/2.8|0)+"px;font-weight:700;color:#fff;flex-shrink:0",text:u.avatar});
  return av;
}
function canEdit(disc){
  if(!CURRENT_USER) return false;
  if(CURRENT_USER.role==="admin") return true;
  if(CURRENT_USER.role==="storekeeper" && CURRENT_USER.discs.indexOf(disc)>=0) return true;
  return false;
}
function canView(disc){
  if(!CURRENT_USER) return false;
  if(CURRENT_USER.role==="admin") return true;
  return CURRENT_USER.discs.indexOf(disc)>=0;
}
function canApprove(){return CURRENT_USER&&CURRENT_USER.role==="admin";}

function renderUserChip(){

  var chip=el("div",{cls:"user-chip"});
  chip.appendChild(avatarEl(CURRENT_USER,28));
  var txt=el("div",null);
  txt.appendChild(el("div",{cls:"user-chip-name",text:CURRENT_USER.name.split(" ")[0]}));
  txt.appendChild(el("div",{cls:"user-chip-role",html:roleBadge(CURRENT_USER.role)}));
  chip.appendChild(txt);
  chip.onclick=function(e){e.stopPropagation();toggleUserMenu(wrap);};
  wrap.appendChild(chip);
}
function toggleUserMenu(wrap){
  var existing=wrap.querySelector(".dropdown-menu");
  if(existing){existing.remove();return;}
  var menu=div("dropdown-menu",null);
  var items=[
    {icon:"&#9679;",label:"My Profile",fn:function(){showProfile();}},
    {icon:"&#9675;",label:"Change Role (Demo)",fn:function(){showRoleSwitch();}},
    {icon:"&#9679;",label:"Sign Out",fn:function(){logout();},red:true},
  ];
  items.forEach(function(it){
    var row=el("div",{cls:"dropdown-item",html:it.icon+" "+it.label});
    if(it.red)row.style.color="var(--red)";
    row.onclick=function(){menu.remove();it.fn();};
    menu.appendChild(row);
  });
  wrap.appendChild(menu);
  setTimeout(function(){document.addEventListener("click",function handler(){menu.remove();document.removeEventListener("click",handler);});},0);
}

function buildHistory(){
  var wrap=div("",null);
  var filterDisc=window._histDisc||"ALL";
  var filterType=window._histType||"ALL";

  // Filters
  var fbar=el("div",{style:"display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap"});
  var discTabsH=el("div",{style:"display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:var(--r2);border:1px solid var(--border)"});
  ["ALL"].concat(DB.discs).forEach(function(d){
    var b=el("button",{cls:"dtab"+(filterDisc===d?" on":""),text:d});
    b.onclick=function(){window._histDisc=d;mount("mc",buildHistory());};
    discTabsH.appendChild(b);
  });
  var typeRow=el("div",{style:"display:flex;gap:4px"});
  [{v:"ALL",l:"All"},{v:"in",l:"Stock In"},{v:"out",l:"Stock Out"},{v:"transfer",l:"Transfer"}].forEach(function(t){
    var b=el("button",{cls:"btn btn-sm "+(filterType===t.v?"btn-p":"btn-g"),text:t.l});
    b.onclick=function(){window._histType=t.v;mount("mc",buildHistory());};
    typeRow.appendChild(b);
  });
  fbar.appendChild(discTabsH);fbar.appendChild(typeRow);
  wrap.appendChild(fbar);

  // Filter transactions
  var txns=DB.txns.filter(function(t){
    if(filterDisc!=="ALL"&&t.disc!==filterDisc)return false;
    if(filterType!=="ALL"&&t.type!==filterType)return false;
    return true;
  }).slice().reverse(); // newest first

  // Pending correction requests banner
  var pendingReqs=REQUESTS.filter(function(r){return r.status==="pending";});
  if(pendingReqs.length&&canApprove()){
    var banner=el("div",{style:"background:#fef9c3;border:1px solid #fde68a;border-radius:var(--r2);padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between"});
    banner.appendChild(el("span",{style:"font-size:13px;font-weight:600;color:#854d0e",html:"&#9888; "+pendingReqs.length+" correction request(s) awaiting approval"}));
    var viewBtn=btn("btn-g btn-sm","Review Requests",function(){showCorrectionRequests();});
    banner.appendChild(viewBtn);
    wrap.appendChild(banner);
  }

  var card=div("tc",null);
  var hd=div("th",null);
  hd.appendChild(el("span",{cls:"tt",text:"Transaction History"}));
  hd.appendChild(el("span",{style:"font-size:12px;color:var(--text2)",text:txns.length+" entries"}));
  card.appendChild(hd);

  if(!txns.length){card.appendChild(el("div",{cls:"empty",text:"No transactions found."}));wrap.appendChild(card);return wrap;}

  // Column header
  var cols=["Date","Type","Discipline","Material","Qty / Unit","Reference","By","Status","Actions"];
  var grid="90px 70px 90px 1fr 90px 120px 100px 80px 100px";
  var colHdr=el("div",{cls:"hist-row hist-hdr",style:"grid-template-columns:"+grid});
  cols.forEach(function(c){colHdr.appendChild(el("span",{text:c}));});
  card.appendChild(colHdr);

  txns.forEach(function(t){
    var m=gm(t.mid);
    var tc=t.type==="in"?"bg":t.type==="out"?"bo":"bp";
    var hasReq=REQUESTS.some(function(r){return r.txnId===t.id&&r.status==="pending";});
    var isApproved=REQUESTS.some(function(r){return r.txnId===t.id&&r.status==="approved";});

    var row=el("div",{cls:"hist-row",style:"grid-template-columns:"+grid});
    row.appendChild(el("span",{style:"color:var(--text2);font-size:12px",text:fdate(t.date)}));
    var typeSp=el("span",null);typeSp.innerHTML='<span class="badge '+tc+'">'+t.type.toUpperCase()+"</span>";row.appendChild(typeSp);
    var discSp=el("span",null);discSp.innerHTML=badge(t.disc);row.appendChild(discSp);
    row.appendChild(el("span",{style:"font-weight:600",text:m?m.name:"(deleted)"}));
    row.appendChild(el("span",{cls:"mono",style:"color:"+(t.type==="in"?"#16a34a":"#ea580c"),text:(t.type==="in"?"+":"-")+fn(t.qty)+" "+(m?m.unit:"")}));
    row.appendChild(el("span",{style:"font-size:12px;color:var(--text2)",text:t.ref||""}));
    row.appendChild(el("span",{style:"font-size:12px;color:var(--text2)",text:t.by||""}));

    // Status
    var statusSp=el("span",null);
    if(hasReq)statusSp.innerHTML='<span class="status-pill sp-pending">Pending</span>';
    else if(isApproved)statusSp.innerHTML='<span class="status-pill sp-edited">Edited</span>';
    else statusSp.innerHTML='<span class="status-pill sp-approved">OK</span>';
    row.appendChild(statusSp);

    // Actions
    var actCol=el("div",{style:"display:flex;gap:4px;flex-wrap:wrap"});
    // Admin can directly edit
    if(canApprove()){
      var editBtn=btn("btn-g btn-sm","Edit",(function(tid){return function(){openHistEdit(tid,false);};})(t.id));
      actCol.appendChild(editBtn);
    }
    // Storekeeper can request correction for their disc
    else if(canEdit(t.disc)&&!hasReq){
      var reqBtn=btn("btn-g btn-sm","Request Edit",(function(tid){return function(){openCorrectionRequest(tid);};})(t.id));
      actCol.appendChild(reqBtn);
    }
    // Pending request — admin approval
    if(hasReq&&canApprove()){
      var approveBtn=btn("btn-s btn-sm","Review",(function(tid){return function(){showCorrectionRequests(tid);};})(t.id));
      actCol.appendChild(approveBtn);
    }
    row.appendChild(actCol);
    card.appendChild(row);
  });

  wrap.appendChild(card);return wrap;
}

function openHistEdit(txnId,fromRequest){
  var t=null;DB.txns.forEach(function(x){if(x.id===txnId)t=x;});if(!t)return;
  var m=gm(t.mid);
  var dtInp=el("input",{type:"date"});dtInp.value=t.date;
  var qtyInp=el("input",{type:"number",min:"0"});qtyInp.value=String(t.qty);
  var refInp=el("input",{placeholder:"Reference"});refInp.value=t.ref||"";
  var byInp=el("input",{placeholder:"Issued By"});byInp.value=t.by||"";
  var noteInp=el("input",{placeholder:"Reason for edit (audit trail)"});
  var body=[
    el("div",{style:"padding:10px 14px;background:var(--bg3);border-radius:var(--r);margin-bottom:14px",html:"<strong>Transaction:</strong> "+t.type.toUpperCase()+" &mdash; "+(m?m.name:"deleted")+" &mdash; "+fn(t.qty)+" "+(m?m.unit:"")}),
    frow("c2",[fgroup("Date",dtInp),fgroup("Quantity",qtyInp)]),
    frow("c2",[fgroup("Reference",refInp),fgroup("By",byInp)]),
    frow("",[fgroup("Edit Reason (logged)",noteInp)])
  ];
  sm(makeModal("Edit Transaction"+(fromRequest?" (Admin Approval)":""),body,[
    btn("btn-g","Cancel",cm),
    btn("btn-p","Save Changes",function(){
      var oldQty=t.qty;var newQty=parseInt(qtyInp.value)||0;
      var diff=newQty-oldQty;
      // Adjust stock
      if(m){
        if(t.type==="in") m.stock+=diff;
        else if(t.type==="out") m.stock-=diff;
      }
      t.date=dtInp.value;t.qty=newQty;t.ref=refInp.value;t.by=byInp.value;
      // Mark any pending request as approved
      REQUESTS.forEach(function(r){if(r.txnId===txnId&&r.status==="pending"){r.status="approved";r.adminNote=noteInp.value;}});
      cm();render();
      alert("Transaction updated. Audit log saved.");
    })
  ],"560px"));
}

function openCorrectionRequest(txnId){
  var t=null;DB.txns.forEach(function(x){if(x.id===txnId)t=x;});if(!t)return;
  var m=gm(t.mid);
  var reasonInp=el("input",{placeholder:"Describe what needs to be corrected..."});
  var suggestQty=el("input",{type:"number",placeholder:"Suggested correct qty"});suggestQty.value=String(t.qty);
  var body=[
    el("div",{style:"padding:10px 14px;background:var(--bg3);border-radius:var(--r);margin-bottom:14px",html:"<strong>Transaction:</strong> "+t.type.toUpperCase()+" &mdash; "+(m?m.name:"")+" &mdash; "+fn(t.qty)+" "+(m?m.unit:"")}),
    frow("c2",[fgroup("Suggested Correct Qty",suggestQty),fgroup("",el("div",null))]),
    frow("",[fgroup("Reason for Correction",reasonInp)])
  ];
  sm(makeModal("Request Correction",body,[
    btn("btn-g","Cancel",cm),
    btn("btn-p","Submit Request",function(){
      if(!reasonInp.value.trim()){alert("Enter a reason.");return;}
      REQUESTS.push({id:"req"+String(Date.now()),txnId:txnId,reqBy:CURRENT_USER?CURRENT_USER.name:"Unknown",suggestQty:parseInt(suggestQty.value)||t.qty,reason:reasonInp.value,status:"pending",date:today()});
      cm();render();
      alert("Correction request submitted. Admin will review.");
    })
  ],"520px"));
}

function showCorrectionRequests(highlightTxnId){
  var pending=REQUESTS.filter(function(r){return r.status==="pending";});
  var body=[el("div",{style:"margin-bottom:12px"})];
  if(!pending.length){body.push(el("div",{cls:"empty",text:"No pending correction requests."}));}
  pending.forEach(function(r){
    var t=null;DB.txns.forEach(function(x){if(x.id===r.txnId)t=x;});
    var m=t?gm(t.mid):null;
    var card=el("div",{style:"border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden"+(r.txnId===highlightTxnId?";border-color:var(--amber)":"")});
    var hd=el("div",{style:"background:var(--bg3);padding:9px 13px;display:flex;align-items:center;justify-content:space-between"});
    hd.appendChild(el("div",{html:"<strong>"+r.reqBy+"</strong> &mdash; "+r.date+'<span class="status-pill sp-pending" style="margin-left:8px">Pending</span>'}));
    var acts=div("fc",null);
    var approveBtn=btn("btn-s btn-sm","Approve & Edit",(function(rid,tid){return function(){var req=null;REQUESTS.forEach(function(x){if(x.id===rid)req=x;});if(req)req.status="reviewing";cm();openHistEdit(tid,true);};})(r.id,r.txnId));
    var rejectBtn=btn("btn-d btn-sm","Reject",(function(rid){return function(){REQUESTS.forEach(function(x){if(x.id===rid)x.status="rejected";});cm();render();};})(r.id));
    acts.appendChild(approveBtn);acts.appendChild(rejectBtn);hd.appendChild(acts);card.appendChild(hd);
    var bd=el("div",{style:"padding:10px 13px;font-size:13px"});
    bd.appendChild(el("div",{style:"margin-bottom:4px",html:"<strong>Transaction:</strong> "+(t?t.type.toUpperCase()+" &mdash; "+(m?m.name:"")+" &mdash; "+fn(t.qty)+" "+(m?m.unit:""):"(not found)")}));
    bd.appendChild(el("div",{style:"margin-bottom:4px",html:"<strong>Suggested Qty:</strong> "+fn(r.suggestQty)}));
    bd.appendChild(el("div",{html:"<strong>Reason:</strong> "+r.reason}));
    card.appendChild(bd);body.push(card);
  });
  sm(makeModal("Correction Requests",body,[btn("btn-g","Close",cm)],"640px"));
}

function buildAccess(){
  if(!canApprove()){
    return el("div",{cls:"empty",text:"Access management is restricted to Admins."});
  }
  var wrap=div("",null);

  // Header stats
  var g=el("div",{style:"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px"});
  var roles={admin:0,storekeeper:0,foreman:0,viewer:0};
  USERS.forEach(function(u){if(roles[u.role]!==undefined)roles[u.role]++;});
  [["Admins",roles.admin,"#dc2626"],["Storekeepers",roles.storekeeper,"#2563eb"],["Foremen",roles.foreman,"#d97706"],["Viewers",roles.viewer,"#7c3aed"]].forEach(function(x){
    var c=div("sc",null);c.style.borderLeft="3px solid "+x[2];
    c.innerHTML='<div class="sl">'+x[0]+'</div><div class="sv" style="color:'+x[2]+'">'+x[1]+"</div>";
    g.appendChild(c);
  });
  wrap.appendChild(g);

  // Users table
  var card=div("tc",null);
  var hdRow=div("th",null);
  hdRow.appendChild(el("span",{cls:"tt",text:"Team Access Management"}));
  hdRow.appendChild(btn("btn-p btn-sm","+ Add Member",function(){openAddMember();}));
  card.appendChild(hdRow);

  USERS.forEach(function(u){
    var row=el("div",{cls:"user-row"});
    row.appendChild(avatarEl(u,36));
    var info=el("div",{style:"flex:1"});
    info.appendChild(el("div",{style:"font-size:13px;font-weight:600",text:u.name}));
    info.appendChild(el("div",{style:"font-size:12px;color:var(--text2)",text:u.email||(u.phone||"")}));
    row.appendChild(info);
    var discLabels=el("div",{style:"display:flex;gap:4px;flex-wrap:wrap"});
    u.discs.forEach(function(d){var p=pal(d);var sp=el("span",{cls:"pill",text:d});sp.style.cssText="background:"+p.bg+";color:"+p.color+";font-weight:600";discLabels.appendChild(sp);});
    row.appendChild(discLabels);
    var roleWrap=el("div",{style:"min-width:90px"});roleWrap.innerHTML=roleBadge(u.role);row.appendChild(roleWrap);
    var statusSp=el("span",{style:"font-size:12px;font-weight:600;color:"+(u.active?"#16a34a":"#dc2626"),text:u.active?"Active":"Disabled"});row.appendChild(statusSp);
    var acts=div("fc",null);
    acts.appendChild(btn("btn-g btn-sm","Edit",(function(uid){return function(){openEditMember(uid);};})(u.id)));
    if(u.id!==CURRENT_USER.id){
      var togBtn=btn((u.active?"btn-d":"btn-s")+" btn-sm",u.active?"Disable":"Enable",(function(uid){return function(){USERS.forEach(function(x){if(x.id===uid)x.active=!x.active;});mount("mc",buildAccess());};})(u.id));
      acts.appendChild(togBtn);
    }
    row.appendChild(acts);
    card.appendChild(row);
  });
  wrap.appendChild(card);return wrap;
}

function openAddMember(){
  var nameInp=el("input",{placeholder:"Full name"});
  var emailInp=el("input",{type:"email",placeholder:"Email address"});
  var phoneInp=el("input",{placeholder:"+971 50 000 0000 (optional)"});
  var roleSel=sel("am_role",[{text:"Admin",value:"admin"},{text:"Storekeeper",value:"storekeeper"},{text:"Foreman",value:"foreman"},{text:"Viewer",value:"viewer"}],"foreman");
  var discWrap=el("div",{style:"display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"});
  var discChecks={};
  DB.discs.forEach(function(d){
    var chk=el("input",{type:"checkbox",id:"am_d_"+d});chk.checked=true;chk.style.cssText="width:auto;margin-right:4px";
    var lbl=el("label",{for:"am_d_"+d,text:d,style:"display:flex;align-items:center;gap:4px;font-size:13px;padding:4px 10px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer"});
    lbl.prepend(chk);discWrap.appendChild(lbl);discChecks[d]=chk;
  });
  var avatarColors=["#2563eb","#0d9488","#dc2626","#7c3aed","#d97706","#059669"];
  var body=[
    frow("c2",[fgroup("Full Name",nameInp),fgroup("Email",emailInp)]),
    frow("c2",[fgroup("Phone (optional)",phoneInp),fgroup("Role",roleSel)]),
    frow("",[fgroup("Store Access",discWrap)])
  ];
  sm(makeModal("Add Team Member",body,[
    btn("btn-g","Cancel",cm),
    btn("btn-p","Add Member",function(){
      if(!nameInp.value.trim()){alert("Enter name.");return;}
      var discs=[];DB.discs.forEach(function(d){if(discChecks[d]&&discChecks[d].checked)discs.push(d);});
      var initials=nameInp.value.trim().split(" ").map(function(w){return w[0];}).join("").toUpperCase().slice(0,2);
      USERS.push({id:"u"+Date.now(),name:nameInp.value.trim(),email:emailInp.value.trim(),phone:phoneInp.value.trim(),role:roleSel.value,avatar:initials||"?",color:avatarColors[USERS.length%avatarColors.length],discs:discs,active:true});
      cm();mount("mc",buildAccess());
    })
  ],"540px"));
}

function openEditMember(uid){
  var u=null;USERS.forEach(function(x){if(x.id===uid)u=x;});if(!u)return;
  var nameInp=el("input",{value:u.name});
  var emailInp=el("input",{type:"email",value:u.email});
  var roleSel=sel("em_role",[{text:"Admin",value:"admin"},{text:"Storekeeper",value:"storekeeper"},{text:"Foreman",value:"foreman"},{text:"Viewer",value:"viewer"}],u.role);
  var discWrap=el("div",{style:"display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"});
  var discChecks={};
  DB.discs.forEach(function(d){
    var chk=el("input",{type:"checkbox",id:"em_d_"+d});chk.checked=u.discs.indexOf(d)>=0;chk.style.cssText="width:auto;margin-right:4px";
    var lbl=el("label",{for:"em_d_"+d,text:d,style:"display:flex;align-items:center;gap:4px;font-size:13px;padding:4px 10px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer"});
    lbl.prepend(chk);discWrap.appendChild(lbl);discChecks[d]=chk;
  });
  var body=[
    frow("c2",[fgroup("Full Name",nameInp),fgroup("Email",emailInp)]),
    frow("c2",[fgroup("Role",roleSel),el("div",null)]),
    frow("",[fgroup("Store Access",discWrap)])
  ];
  sm(makeModal("Edit Member — "+u.name,body,[
    btn("btn-g","Cancel",cm),
    btn("btn-p","Save Changes",function(){
      u.name=nameInp.value.trim();u.email=emailInp.value.trim();u.role=roleSel.value;
      u.discs=[];DB.discs.forEach(function(d){if(discChecks[d]&&discChecks[d].checked)u.discs.push(d);});
      var initials=u.name.split(" ").map(function(w){return w[0];}).join("").toUpperCase().slice(0,2);
      u.avatar=initials||"?";
      cm();mount("mc",buildAccess());
    })
  ],"540px"));
}
